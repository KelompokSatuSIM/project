<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cashier - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes rotate {
            from { transform: scale(0) rotate(-180deg); }
            to { transform: scale(1) rotate(0deg); }
        }
        
        .animate-pulse-custom {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out;
        }
        
        .animate-rotate {
            animation: rotate 0.6s ease-out;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(168, 85, 247, 0.1) 100%);
        }
        
        .blur-circle {
            filter: blur(60px);
        }
        
        .card-shadow {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .tab-active {
            background-color: white;
            color: #1f2937;
        }
        
        .tab-inactive {
            background-color: transparent;
            color: #6b7280;
        }
        
        .role-btn-active {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.25);
        }
        
        .role-btn-inactive {
            background: white;
            color: #4b5563;
            border: 2px solid #e5e7eb;
        }
        
        .role-btn-inactive:hover {
            border-color: rgba(99, 102, 241, 0.5);
        }
        
        .input-field {
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-20 left-10 w-72 h-72 bg-indigo-300 opacity-20 rounded-full blur-circle"></div>
        <div class="absolute bottom-20 right-10 w-96 h-96 bg-purple-300 opacity-20 rounded-full blur-circle"></div>
    </div>

    <div class="min-h-screen flex items-center justify-center p-4 relative z-10 animate-fadeIn">
        <div class="w-full max-w-md">
            <div class="bg-white/95 backdrop-blur-sm rounded-2xl card-shadow border-2 border-gray-100">
                <div class="text-center space-y-4 pt-8 pb-8 px-6">
                    <div class="mx-auto w-24 h-24 bg-gradient-to-br from-indigo-500 via-indigo-600 to-purple-600 rounded-3xl flex items-center justify-center shadow-2xl relative overflow-hidden animate-rotate">
                        <div class="absolute inset-0 bg-gradient-to-tr from-indigo-500/20 to-purple-500/20 animate-pulse-custom"></div>
                        <svg class="w-12 h-12 text-white relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                        </svg>
                    </div>
                    
                    <div>
                        <h1 class="text-4xl font-bold bg-gradient-to-r from-indigo-600 via-indigo-700 to-purple-600 bg-clip-text text-transparent mb-2">
                            Your Cashier
                        </h1>
                        <p class="text-gray-600">Smart Solutions for Modern Business</p>
                    </div>
                </div>

                <div class="px-6 pb-8 space-y-6">
                    <!-- Role Selection -->

                    <!-- Tabs (Conditionally rendered based on role) -->

                        <!-- Account Tab -->
                        <div id="accountContent" class="space-y-4">
                            <form onsubmit="handleLogin(event)" class="space-y-4">
                                <div class="space-y-2">
                                    <label for="username" class="block text-sm font-medium text-gray-900">Username</label>
                                    <div class="relative">
                                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                        </svg>
                                        <input 
                                            type="text" 
                                            id="username" 
                                            placeholder="Enter your username"
                                            class="input-field w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-lg"
                                        >
                                    </div>
                                    <p id="usernameError" class="text-sm text-red-600 hidden"></p>
                                </div>

                                <div class="space-y-2">
                                    <div class="flex items-center justify-between">
                                        <label for="password" class="block text-sm font-medium text-gray-900">Password</label>
                                        <button type="button" class="text-xs text-indigo-600 hover:underline" onclick="alert('Contact your administrator to reset password')">
                                            Forgot password?
                                        </button>
                                    </div>
                                    <div class="relative">
                                        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                        </svg>
                                        <input 
                                            type="password" 
                                            id="password" 
                                            placeholder="Enter your password"
                                            class="input-field w-full pl-10 pr-12 py-3 border-2 border-gray-200 rounded-lg"
                                        >
                                        <button 
                                            type="button" 
                                            onclick="togglePassword()" 
                                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
                                        >
                                            <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                            </svg>
                                        </button>
                                    </div>
                                    <p id="passwordError" class="text-sm text-red-600 hidden"></p>
                                </div>

                                <div class="flex items-center space-x-2">
                                    <input 
                                        type="checkbox" 
                                        id="remember" 
                                        class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500"
                                    >
                                    <label for="remember" class="text-sm text-gray-700 cursor-pointer">
                                        Remember me for 30 days
                                    </label>
                                </div>

                                <button 
                                    type="submit" 
                                    id="loginBtn"
                                    class="btn-primary w-full h-12 text-white text-base font-semibold rounded-lg shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2"
                                >
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                                    </svg>
                                    <span id="loginBtnText">Sign In</span>
                                </button>
                            </form>
                        </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <p class="text-center text-sm text-gray-600 mt-6">
                By signing in, you agree to our 
                <button class="text-indigo-600 hover:underline" type="button">Terms of Service</button>
                and 
                <button class="text-indigo-600 hover:underline" type="button">Privacy Policy</button>
            </p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCYYvekxHtOuCzwJ6TYcjBuodoJJ09YW3E",
            authDomain: "simnihbos.firebaseapp.com",
            databaseURL: "https://simnihbos-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "simnihbos",
            storageBucket: "simnihbos.firebasestorage.app",
            messagingSenderId: "637893179915",
            appId: "1:637893179915:web:4c8b94c41eb8e789e8650e",
            measurementId: "G-B9PZVLVRLF"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let showPassword = false;

        // Initialize DEFAULT ACCOUNTS
        function initializeDefaultAccounts() {
            const defaultAccounts = {
                'kelompok1': {
                    username: 'kelompok1',
                    password: 'kelompok1josjis',
                    name: 'Kelompok1',
                    role: 'owner',
                    createdAt: new Date().toISOString()
                },
                'admin': {
                    username: 'admin',
                    password: 'admin123',
                    name: 'Administrator',
                    role: 'owner',
                    createdAt: new Date().toISOString()
                },
                'staff': {
                    username: 'staff',
                    password: 'staff123',
                    name: 'Staff',
                    role: 'staff',
                    createdAt: new Date().toISOString()
                },
                'mankeub': {
                    username: 'mankeub',
                    password: 'keuangan123',
                    name: 'Man Keu B',
                    role: 'staff',
                    createdAt: new Date().toISOString()
                },
                'kasir2': {
                    username: 'kasir2',
                    password: 'kasir456',
                    name: 'Kasir 2',
                    role: 'staff',
                    createdAt: new Date().toISOString()
                }
            };

            Object.keys(defaultAccounts).forEach(key => {
                database.ref('users/' + key).once('value')
                    .then((snapshot) => {
                        if (!snapshot.exists()) {
                            database.ref('users/' + key).set(defaultAccounts[key]);
                        }
                    });
            });
        }


        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            showPassword = !showPassword;

            if (showPassword) {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
            }
        }

        function handleLogin(e) {
    e.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const usernameError = document.getElementById('usernameError');
    const passwordError = document.getElementById('passwordError');
    const loginBtn = document.getElementById('loginBtn');
    const loginBtnText = document.getElementById('loginBtnText');

    usernameError.classList.add('hidden');
    passwordError.classList.add('hidden');

    if (!username || !password) {
        if (!username) {
            usernameError.textContent = 'Username is required';
            usernameError.classList.remove('hidden');
        }
        if (!password) {
            passwordError.textContent = 'Password is required';
            passwordError.classList.remove('hidden');
        }
        return;
    }

    loginBtn.disabled = true;
    loginBtnText.innerHTML = 'Signing in...';

    database.ref('users/' + username).once('value')
        .then((snapshot) => {
            if (snapshot.exists()) {
                const user = snapshot.val();
                
                // PENTING: Hapus pengecekan selectedRole di sini
                if (user.password === password) { 
                    localStorage.setItem('isAuthenticated', 'true');
                    localStorage.setItem('userRole', user.role); // Role otomatis terbaca dari database
                    localStorage.setItem('username', user.name);
                    
                    window.location.replace('dashboard-owner.html');
                } else {
                    passwordError.textContent = 'Incorrect password';
                    passwordError.classList.remove('hidden');
                    resetButton();
                }
            } else {
                usernameError.textContent = 'Username not found';
                usernameError.classList.remove('hidden');
                resetButton();
            }
        })
        .catch((error) => {
            alert('Error: ' + error.message);
            resetButton();
        });

    function resetButton() {
        loginBtn.disabled = false;
        loginBtnText.textContent = 'Sign In';
    }
}

    </script>
</body>
</html>
