<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cashier - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes rotate {
            from { transform: scale(0) rotate(-180deg); }
            to { transform: scale(1) rotate(0deg); }
        }
        
        .animate-pulse-custom {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out;
        }
        
        .animate-rotate {
            animation: rotate 0.6s ease-out;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(255, 255, 255, 0.05) 50%, rgba(168, 85, 247, 0.1) 100%);
        }
        
        .blur-circle {
            filter: blur(60px);
        }
        
        .card-shadow {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .tab-active {
            background-color: white;
            color: #1f2937;
        }
        
        .tab-inactive {
            background-color: transparent;
            color: #6b7280;
        }
        
        .role-btn-active {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.25);
        }
        
        .role-btn-inactive {
            background: white;
            color: #4b5563;
            border: 2px solid #e5e7eb;
        }
        
        .role-btn-inactive:hover {
            border-color: rgba(99, 102, 241, 0.5);
        }
        
        .input-field {
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen">
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-20 left-10 w-72 h-72 bg-indigo-300 opacity-20 rounded-full blur-circle"></div>
        <div class="absolute bottom-20 right-10 w-96 h-96 bg-purple-300 opacity-20 rounded-full blur-circle"></div>
    </div>

    <div class="min-h-screen flex items-center justify-center p-4 relative z-10 animate-fadeIn">
        <div class="w-full max-w-md">
            <div class="bg-white/95 backdrop-blur-sm rounded-2xl card-shadow border-2 border-gray-100">
                <div class="text-center space-y-4 pt-8 pb-8 px-6">
                    <div class="mx-auto w-24 h-24 bg-gradient-to-br from-indigo-500 via-indigo-600 to-purple-600 rounded-3xl flex items-center justify-center shadow-2xl relative overflow-hidden animate-rotate">
                        <div class="absolute inset-0 bg-gradient-to-tr from-indigo-500/20 to-purple-500/20 animate-pulse-custom"></div>
                        <svg class="w-12 h-12 text-white relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                        </svg>
                    </div>
                    
                    <div>
                        <h1 class="text-4xl font-bold bg-gradient-to-r from-indigo-600 via-indigo-700 to-purple-600 bg-clip-text text-transparent mb-2">
                            Your Cashier
                        </h1>
                        <p class="text-gray-600">Smart Solutions for Modern Business</p>
                    </div>
                </div>

                <div class="px-6 pb-8 space-y-6">
                    <div id="accountContent" class="space-y-4">
    <!-- FORM LOGIN -->
    <form onsubmit="handleLogin(event)" class="space-y-4">
        <div class="space-y-2">
            <label for="username" class="block text-sm font-medium text-gray-900">Username</label>
            <div class="relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <input type="text" id="username" placeholder="Enter your username" class="input-field w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-lg">
            </div>
        </div>

        <div class="space-y-2">
            <div class="flex items-center justify-between">
                <label for="password" class="block text-sm font-medium text-gray-900">Password</label>
            </div>
            <div class="relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                <input type="password" id="password" placeholder="Enter your password" class="input-field w-full pl-10 pr-12 py-3 border-2 border-gray-200 rounded-lg">
            </div>
        </div>
        <div class="flex items-center space-x-2">
        <input type="checkbox" id="remember" class="w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
        <label for="remember" class="text-sm text-gray-700 cursor-pointer">Remember me for 30 days</label>
    </div>
                        </div>

        <!-- TOMBOL SIGN IN UTAMA -->
        <button type="submit" id="loginBtn" class="btn-primary w-full h-12 text-white text-base font-semibold rounded-lg shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2 mt-4">
            <span id="loginBtnText">Sign In</span>
        </button>

        <!-- PEMISAH "OR" -->
        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-200"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white text-gray-400 font-bold text-xs">OR</span>
            </div>
        </div>

        <!-- TOMBOL DAFTAR TOKO (Di bawah Sign In) -->
        <button type="button" onclick="openRegisterModal()" class="w-full h-12 bg-white border-2 border-indigo-600 text-indigo-600 text-sm font-bold rounded-lg hover:bg-indigo-50 transition-all">
            Daftar Toko Baru
        </button>
    </form>
</div>
    <!-- Checkbox Remember Me -->
                        <!-- Register Tab Content -->
<div id="registerModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
    <div class="bg-white rounded-2xl w-full max-w-md p-8 shadow-2xl relative">
        <button onclick="closeRegisterModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl">&times;</button>

        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Daftar Toko Baru</h2>
            <p class="text-sm text-gray-500">Isi data di bawah untuk pengajuan aktivasi</p>
        </div>
        
        <form onsubmit="handleRegister(event)" class="space-y-4">
            <!-- KOLOM BARU: NAMA PEMILIK -->
            <div>
                <label class="block text-sm font-medium text-gray-700">Nama Toko</label>
                <input type="text" id="regStoreName" required class="input-field w-full px-4 py-3 border-2 border-gray-200 rounded-lg" placeholder="Contoh: Toko Berkah">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Nama Pemilik</label>
                <input type="text" id="regFullName" required class="input-field w-full px-4 py-3 border-2 border-gray-200 rounded-lg" placeholder="Nama Lengkap Anda">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Username Admin</label>
                <input type="text" id="regUsername" required class="input-field w-full px-4 py-3 border-2 border-gray-200 rounded-lg" placeholder="Username untuk login">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" id="regPassword" required class="input-field w-full px-4 py-3 border-2 border-gray-200 rounded-lg" placeholder="Password min. 6 karakter">
            </div>
            
            <button type="submit" class="btn-primary w-full h-12 text-white font-bold rounded-lg shadow-lg mt-4">
                Kirim Permohonan Aktivasi
            </button>
        </form>
    </div>
</div>

            <p class="text-center text-sm text-gray-600 mt-6">
                By signing in, you agree to our 
                <button class="text-indigo-600 hover:underline" type="button">Terms of Service</button>
                and 
                <button class="text-indigo-600 hover:underline" type="button">Privacy Policy</button>
            </p>
        </div>
    </div>

    <script>
        // 1. Inisialisasi Firebase
const firebaseConfig = {
    apiKey: "AIzaSyCYYvekxHtOuCzwJ6TYcjBuodoJJ09YW3E",
    authDomain: "simnihbos.firebaseapp.com",
    databaseURL: "https://simnihbos-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "simnihbos",
    storageBucket: "simnihbos.firebasestorage.app",
    messagingSenderId: "637893179915",
    appId: "1:637893179915:web:4c8b94c41eb8e789e8650e",
    measurementId: "G-B9PZVLVRLF"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// 2. Fungsi untuk Modal (Harus di luar fungsi lain)
function openRegisterModal() {
    const modal = document.getElementById('registerModal');
    if (modal) {
        modal.classList.remove('hidden');
        console.log("Modal dibuka");
    } else {
        console.error("Elemen registerModal tidak ditemukan!");
    }
}

function closeRegisterModal() {
    const modal = document.getElementById('registerModal');
    if (modal) {
        modal.classList.add('hidden');
    }
}

// 3. Fungsi Register (Daftar Toko)
function handleRegister(e) {
    e.preventDefault();
    
    const storeName = document.getElementById('regStoreName').value;
    const username = document.getElementById('regUsername').value;
    const password = document.getElementById('regPassword').value;
    const storeId = 'STR-' + Date.now();

    // Validasi sederhana
    if (!storeName || !username || !password) {
        alert("Semua kolom harus diisi!");
        return;
    }

    database.ref('users/' + username).set({
        name: username,
        password: password,
        role: 'owner',
        storeId: storeId,
        isActive: false
    }).then(() => {
        return database.ref('stores/' + storeId).set({
            storeName: storeName,
            status: 'pending',
            owner: username
        });
    }).then(() => {
        alert('Pendaftaran Berhasil! Akun Anda sedang menunggu aktivasi.');
        closeRegisterModal();
    }).catch((error) => {
        alert('Terjadi kesalahan: ' + error.message);
    });
}

// 4. Fungsi Login
function handleLogin(e) {
    e.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const loginBtn = document.getElementById('loginBtn');
    const loginBtnText = document.getElementById('loginBtnText');

    if (!username || !password) {
        alert("Isi username dan password!");
        return;
    }

    loginBtn.disabled = true;
    loginBtnText.innerText = "Signing in...";

    database.ref('users/' + username).once('value')
        .then((snapshot) => {
            if (snapshot.exists()) {
                const user = snapshot.val();
                
                // 1. Cek Password
                if (user.password === password) {
                    
                    // 2. CEK APAKAH AKUN SUDAH DIAKTIVASI ADMIN
                    if (user.isActive === true) {
                        localStorage.setItem('isAuthenticated', 'true');
                        localStorage.setItem('userRole', user.role);
                        localStorage.setItem('username', user.name);
                        localStorage.setItem('storeId', user.storeId);
                        
                        alert('Login Berhasil!');
                        window.location.replace('dashboard-owner.html');
                    } else {
                        // Jika isActive masih false
                        alert('Akun Anda belum aktif. Silakan hubungi Admin untuk persetujuan (Aktivasi).');
                        resetLoginButton();
                    }

                } else {
                    alert('Password salah!');
                    resetLoginButton();
                }
            } else {
                alert('User tidak ditemukan!');
                resetLoginButton();
            }
        })
        .catch((error) => {
            alert('Error: ' + error.message);
            resetLoginButton();
        });
}

function resetLoginButton() {
    const loginBtn = document.getElementById('loginBtn');
    const loginBtnText = document.getElementById('loginBtnText');
    loginBtn.disabled = false;
    loginBtnText.innerText = "Sign In";
}

// 5. Menutup modal jika klik di luar area box putih
window.onclick = function(event) {
    const modal = document.getElementById('registerModal');
    if (event.target == modal) {
        closeRegisterModal();
    }
}

    </script>
</body>
</html>
